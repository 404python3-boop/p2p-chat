<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Chat Fixed</title>
    <style>
        :root { --eth: #26A17B; --bg: #0E1621; --panel: #17212B; --text: #F5F5F5; }
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: sans-serif; overflow: hidden;
        }

        /* Контейнер на весь экран */
        .app {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            max-width: 500px; margin: 0 auto; background: var(--panel);
        }

        header { 
            height: 50px; display: flex; align-items: center; justify-content: center;
            color: var(--eth); font-weight: bold; border-bottom: 1px solid #232E3C;
            font-size: 14px; flex-shrink: 0;
        }

        /* Окно чата */
        #chat { 
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            background: #0c121a;
        }

        .m { 
            padding: 10px 14px; border-radius: 14px; max-width: 85%; 
            font-size: 16px; line-height: 1.4; word-wrap: break-word;
        }
        .mine { background: #2B5278; align-self: flex-end; }
        .others { background: #182533; align-self: flex-start; border-left: 3px solid var(--eth); }

        /* Панель ввода - жестко снизу */
        .input-box { 
            height: 70px; padding: 10px; background: var(--panel);
            display: flex; gap: 10px; border-top: 1px solid #232E3C;
            flex-shrink: 0;
        }

        input { 
            flex: 1; background: #242F3D; border: 1px solid #333; 
            color: white; padding: 0 15px; border-radius: 10px; 
            outline: none; font-size: 16px;
        }

        button { 
            background: var(--eth); color: white; border: none; 
            padding: 0 20px; border-radius: 10px; font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app">
    <header id="status">STEALTH ONLINE</header>
    <div id="chat"></div>
    <div class="input-box">
        <input type="text" id="msg" placeholder="Текст..." autocomplete="off">
        <button id="send">➤</button>
    </div>
</div>

<script>
    const ROOM = 'tether_p2p_final_v1'; 
    const USER = 'ID' + Math.random().toString(36).substr(2, 4);
    const API = `https://ntfy.sh{ROOM}`;

    const chat = document.getElementById('chat');
    const msgInp = document.getElementById('msg');

    async function send() {
        const t = msgInp.value.trim();
        if (!t) return;
        msgInp.value = '';
        render(t, 'mine');
        await fetch(API, { 
            method: 'POST', 
            body: JSON.stringify({t, u: USER, ts: Date.now()}) 
        });
    }

    async function poll() {
        try {
            const r = await fetch(`${API}/json?poll=1&since=now`);
            const lines = (await r.text()).split('\n');
            lines.forEach(l => {
                if (!l) return;
                const d = JSON.parse(l);
                try {
                    const p = JSON.parse(d.message);
                    if (p.u !== USER) render(p.t, 'others');
                } catch(e){}
            });
        } catch(e){}
        setTimeout(poll, 1000);
    }

    function render(txt, side) {
        const d = document.createElement('div');
        d.className = 'm ' + side;
        d.innerText = txt;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('send').onclick = send;
    msgInp.onkeypress = (e) => { if(e.key === 'Enter') send() };
    poll();
</script>
</body>
</html>
