<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Stealth Messenger v1.0</title>
    <style>
        :root { --eth: #26A17B; --bg: #0E1621; --panel: #17212B; --text: #F5F5F5; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--panel); padding: 15px; text-align: center; color: var(--eth); font-weight: bold; border-bottom: 1px solid #232E3C; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0c121a; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .mine { background: #2B5278; align-self: flex-end; border-bottom-right-radius: 2px; }
        .others { background: #182533; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 3px solid var(--eth); }
        .controls { background: var(--panel); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #232E3C; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #242F3D; color: white; font-size: 16px; outline: none; }
        button { background: var(--eth); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header id="status">📡 STEALTH NODE: ПОДКЛЮЧЕНИЕ...</header>

<div id="chat"></div>

<div class="controls">
    <input type="text" id="inp" placeholder="Введите сообщение..." autocomplete="off">
    <button id="btn">➤</button>
</div>

<script>
    // Секретный ID комнаты (измени на любой другой для приватности)
    const ROOM_ID = 'tether_p2p_secret_999';
    const userID = Math.random().toString(36).substr(2, 9);
    
    // Используем бесплатный публичный сервис для пересылки сообщений (маскировка под HTTPS)
    const pubUrl = `https://ntfy.sh{ROOM_ID}`;

    const chat = document.getElementById('chat');
    const inp = document.getElementById('inp');
    const status = document.getElementById('status');

    // Функция получения сообщений (слушаем комнату)
    async function listen() {
        status.innerText = "📡 STEALTH NODE: В СЕТИ";
        const response = await fetch(`${pubUrl}/sse`);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            
            // Обработка данных из потока
            const lines = chunk.split('\n');
            lines.forEach(line => {
                if (line.startsWith('data:')) {
                    try {
                        const data = JSON.parse(line.replace('data:', ''));
                        if (data.user !== userID) {
                            addMsg(data.text, 'others');
                        }
                    } catch (e) {}
                }
            });
        }
    }

    // Функция отправки
    async function send() {
        const text = inp.value.trim();
        if (!text) return;

        addMsg(text, 'mine');
        inp.value = '';

        await fetch(pubUrl, {
            method: 'POST',
            body: JSON.stringify({ text, user: userID })
        });
    }

    function addMsg(txt, type) {
        const d = document.createElement('div');
        d.className = 'msg ' + type;
        d.innerText = txt;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('btn').onclick = send;
    inp.onkeypress = (e) => { if (e.key === 'Enter') send(); };

    // Запуск прослушивания
    listen().catch(() => {
        status.innerText = "ОШИБКА СЕТИ";
        status.style.color = "red";
    });
</script>

</body>
</html>
