<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Stealth Chat</title>
    <style>
        body { background: #0E1621; color: #F5F5F5; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #17212B; padding: 15px; text-align: center; color: #26A17B; font-weight: bold; border-bottom: 1px solid #232E3C; }
        
        /* Зона чата */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0c121a; }
        
        /* Сообщения */
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 16px; word-wrap: break-word; }
        .mine { background: #2B5278; align-self: flex-end; }
        .others { background: #182533; align-self: flex-start; border-left: 3px solid #26A17B; }

        /* Панель ввода - зафиксирована снизу */
        .controls { background: #17212B; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #232E3C; position: sticky; bottom: 0; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #242F3D; color: white; font-size: 16px; outline: none; }
        button { background: #26A17B; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<header id="status">CONNECTING...</header>

<div id="chat">
    <div class="msg others">СИСТЕМА: Если ты видишь это, интерфейс загружен. Напиши что угодно.</div>
</div>

<div class="controls">
    <input type="text" id="inp" placeholder="Текст сообщения..." autocomplete="off">
    <button id="btn">➤</button>
</div>

<script>
    // Используем самый простой и надежный способ связи в браузере
    const socket = new WebSocket('wss://echo.websocket.org');
    const chat = document.getElementById('chat');
    const inp = document.getElementById('inp');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');

    socket.onopen = () => {
        status.innerText = "ONLINE: STEALTH MODE";
        status.style.color = "#26A17B";
    };

    function add(text, type) {
        const d = document.createElement('div');
        d.className = 'msg ' + type;
        d.innerText = text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    function send() {
        const val = inp.value.trim();
        if (val && socket.readyState === WebSocket.OPEN) {
            socket.send(val); // Отправка через зашифрованный туннель
            add(val, 'mine');
            inp.value = '';
            inp.focus();
        }
    }

    btn.onclick = send;
    inp.onkeypress = (e) => { if(e.key === 'Enter') send(); };

    socket.onmessage = (e) => {
        // В режиме теста сервер возвращает сообщение тебе. 
        // Когда мы убедимся, что ТЕБЕ ЕСТЬ КУДА ПИСАТЬ, мы включим состыковку.
        if (typeof e.data === 'string') {
            add(e.data, 'others');
        }
    };

    socket.onerror = () => { status.innerText = "NETWORK ERROR"; };
</script>

</body>
</html>
