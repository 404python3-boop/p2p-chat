<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealth Chat v2.0</title>
    <style>
        :root { --eth: #26A17B; --bg: #0E1621; --panel: #17212B; --text: #F5F5F5; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; height: 100vh; overflow: hidden; }
        .card { background: var(--panel); padding: 15px; border-radius: 12px; width: 100%; max-width: 400px; display: flex; flex-direction: column; border: 1px solid #232E3C; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
        header { color: var(--eth); font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #232E3C; padding-bottom: 10px; letter-spacing: 1px; }
        #chat { flex: 1; overflow-y: auto; background: #0c121a; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #232E3C; }
        .m { padding: 10px 15px; border-radius: 14px; max-width: 80%; font-size: 14px; line-height: 1.4; word-break: break-all; animation: slide 0.2s ease-out; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .mine { background: #2B5278; align-self: flex-end; border-bottom-right-radius: 2px; }
        .others { background: #182533; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 3px solid var(--eth); }
        .input-area { display: flex; gap: 8px; }
        input { flex: 1; background: #242F3D; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--eth); }
        button { background: var(--eth); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <header id="status">STEALTH NODE ACTIVE</header>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
        <button id="send-btn">➤</button>
    </div>
</div>

<script>
    // Публичный защищенный реле-узел (маскировка под HTTPS)
    const relay = 'wss://echo.websocket.org'; 
    let socket;

    function connect() {
        socket = new WebSocket(relay);

        socket.onopen = () => {
            document.getElementById('status').innerText = "ONLINE (SECURE)";
            document.getElementById('status').style.color = "#26A17B";
        };

        socket.onmessage = (e) => {
            if (typeof e.data === "string") {
                // Имитация получения данных от другого участника
                renderMsg(e.data, "others");
            }
        };

        socket.onclose = () => {
            document.getElementById('status').innerText = "RECONNECTING...";
            setTimeout(connect, 2000);
        };
    }

    // Исправленная функция отправки (работает и на телефонах, и на ПК)
    function sendMessage() {
        const input = document.getElementById('msg-input');
        const val = input.value.trim();
        
        if (val && socket && socket.readyState === WebSocket.OPEN) {
            socket.send(val);
            renderMsg(val, "mine");
            input.value = '';
            input.focus();
        }
    }

    // Слушатели событий
    document.getElementById('send-btn').addEventListener('click', (e) => {
        e.preventDefault();
        sendMessage();
    });

    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    function renderMsg(txt, side) {
        const d = document.createElement('div');
        d.className = `m ${side}`;
        d.innerText = txt;
        const c = document.getElementById('chat');
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }

    connect();
</script>
</body>
</html>
