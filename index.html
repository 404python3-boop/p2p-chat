<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Tether P2P Node</title>
    <style>
        :root { --eth: #26A17B; --bg: #0E1621; --panel: #17212B; --text: #F5F5F5; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--panel); padding: 10px; text-align: center; color: var(--eth); font-weight: bold; border-bottom: 1px solid #232E3C; font-size: 14px; }
        #setup { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        #chat-window { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0c121a; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 15px; word-wrap: break-word; }
        .mine { background: #2B5278; align-self: flex-end; }
        .others { background: #182533; align-self: flex-start; border-left: 3px solid var(--eth); }
        textarea { width: 100%; height: 60px; background: #242F3D; border: 1px solid #333; color: #00ff00; border-radius: 5px; padding: 5px; font-size: 10px; box-sizing: border-box; }
        button { background: var(--eth); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .input-area { background: var(--panel); padding: 10px; display: flex; gap: 10px; border-top: 1px solid #232E3C; }
        #msg-input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #242F3D; color: white; }
    </style>
</head>
<body>

<header id="status">P2P SERVER MODE</header>

<div id="setup">
    <button onclick="createOffer()">1. СОЗДАТЬ КАНАЛ (OFFER)</button>
    <textarea id="out-code" readonly placeholder="Ваш ключ для друга..."></textarea>
    <p style="font-size: 11px; margin: 0;">Вставьте ключ друга ниже:</p>
    <textarea id="in-code" placeholder="Сюда вставлять ключ..."></textarea>
    <button onclick="handleConnect()">2. ПОДКЛЮЧИТЬ / ПРИНЯТЬ ОТВЕТ</button>
</div>

<div id="chat-window">
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
        <button onclick="sendMsg()">➤</button>
    </div>
</div>

<script>
    // Самый стабильный STUN сервер Google
    const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:://google.com" }] });
    let dc;

    function initDC(channel) {
        dc = channel;
        dc.onopen = () => {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('status').innerText = "ONLINE (P2P)";
            document.getElementById('status').style.color = "#00ff00";
        };
        dc.onmessage = e => addMsg(e.data, 'others');
    }

    // Шаг 1: Создание оффера
    async function createOffer() {
        initDC(pc.createDataChannel("chat"));
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        pc.onicecandidate = (e) => {
            if (!e.candidate) document.getElementById('out-code').value = btoa(JSON.stringify(pc.localDescription));
        };
        document.getElementById('status').innerText = "ОЖИДАНИЕ ICE...";
    }

    // Шаг 2: Обработка кода
    async function handleConnect() {
        const input = document.getElementById('in-code').value.trim();
        if (!input) return;
        try {
            const desc = new RTCSessionDescription(JSON.parse(atob(input)));
            if (desc.type === "offer") {
                await pc.setRemoteDescription(desc);
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                pc.ondatachannel = e => initDC(e.channel);
                pc.onicecandidate = (e) => {
                    if (!e.candidate) document.getElementById('out-code').value = btoa(JSON.stringify(pc.localDescription));
                };
            } else {
                await pc.setRemoteDescription(desc);
            }
        } catch(e) { alert("Ошибка в ключе!"); }
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if (dc && dc.readyState === "open" && inp.value.trim()) {
            dc.send(inp.value);
            addMsg(inp.value, 'mine');
            inp.value = '';
        }
    }

    function addMsg(txt, side) {
        const d = document.createElement('div');
        d.className = 'msg ' + side;
        d.innerText = txt;
        document.getElementById('messages').appendChild(d);
        document.getElementById('messages').scrollTop = 9999;
    }
</script>
</body>
</html>
