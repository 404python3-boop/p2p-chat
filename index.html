<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealth P2P Node</title>
    <!-- Библиотека Gun.js маскирует трафик под обычные WebSocket/HTTPS запросы -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --eth: #26A17B; --bg: #0E1621; --panel: #17212B; --text: #F5F5F5; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; height: 100vh; }
        .card { background: var(--panel); padding: 15px; border-radius: 12px; width: 100%; max-width: 400px; display: flex; flex-direction: column; border: 1px solid #232E3C; }
        header { color: var(--eth); font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; }
        #chat { flex: 1; overflow-y: auto; background: #0c121a; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #232E3C; }
        .m { padding: 8px 12px; border-radius: 10px; max-width: 85%; font-size: 14px; line-height: 1.4; word-break: break-all; }
        .mine { background: #2B5278; align-self: flex-end; }
        .others { background: #182533; align-self: flex-start; border: 1px solid var(--eth); }
        .input-area { display: flex; gap: 5px; }
        input { flex: 1; background: #242F3D; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--eth); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .room-info { font-size: 10px; color: #6E7C8A; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <header>NODE ACTIVE: SECURE LAYER</header>
    <div class="room-info">Канал: <b id="room-name">tether-stealth-99</b></div>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg" placeholder="Сообщение..." autocomplete="off">
        <button id="send">-></button>
    </div>
</div>

<script>
    // Подключаемся к нескольким публичным реле-узлам для обхода блокировок
    const gun = Gun([
        'https://herokuapp.com',
        'https://wall.org'
    ]);

    // Уникальный ID твоей комнаты. Измени его на любой случайный, чтобы создать приватный чат.
    const room = gun.get('tether-stealth-private-room-001'); 
    const userID = Math.random().toString(36).substr(2, 9);

    const input = document.getElementById('msg');
    const chatDiv = document.getElementById('chat');

    // Функция отправки
    function send() {
        if (!input.value.trim()) return;
        room.set({
            msg: input.value,
            user: userID,
            time: Date.now()
        });
        input.value = '';
    }

    document.getElementById('send').onclick = send;
    input.onkeypress = (e) => { if(e.key === 'Enter') send() };

    // Получение данных
    room.map().once((data) => {
        if (!data || !data.msg) return;
        
        const isMine = data.user === userID;
        const d = document.createElement('div');
        d.className = `m ${isMine ? 'mine' : 'others'}`;
        d.innerText = data.msg;
        
        chatDiv.appendChild(d);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
</script>
</body>
</html>
